<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX CLAIR</title>
    <style>
        /* TON CODE ORIGINAL STRICT - NE PAS TOUCHER */
        body {
            font-family: 'Georgia', serif;
            background-color: #ffffff;
            color: #1a1a1a;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        nav {
            position: absolute;
            top: 60px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.75rem;
        }

        nav a {
            text-decoration: none;
            color: #999;
            margin: 0 25px;
            cursor: pointer; /* Pour le clic */
            transition: color 0.4s;
        }

        nav a:hover {
            color: #000;
        }

        h1 {
            font-weight: normal;
            font-size: 2.2rem;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin: 0;
        }

        /* CETTE ZONE EST CELLE QUI VA CHANGER */
        #main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 600px;
            padding: 0 20px;
        }

        .tagline {
            margin-top: 25px;
            font-style: italic;
            color: #777;
            letter-spacing: 3px;
            font-size: 0.85rem;
            line-height: 1.8;
        }

        footer {
            position: absolute;
            bottom: 50px;
            font-size: 0.6rem;
            color: #ddd;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <nav>
        <a href="collection.html">Collection</a>
        <a onclick="showAccueil()">Max Clair</a>
        <a onclick="showLettre()">La Lettre</a>
    </nav>

    <div id="main-content">
        <h1>MAX CLAIR</h1>
        <div class="tagline">L'Équilibre et le Lien</div>
    </div>

    <footer>
        © 2026 MAX CLAIR — TOUS DROITS RÉSERVÉS
    </footer>

    <script>
        // FONCTION POUR REVENIR À L'ACCUEIL PUR
        function showAccueil() {
            document.getElementById('main-content').innerHTML = `
                <h1>MAX CLAIR</h1>
                <div class="tagline">L'Équilibre et le Lien</div>
            `;
        }

        // FONCTION POUR AFFICHER LA LETTRE
        function showLettre() {
            document.getElementById('main-content').innerHTML = `
                <h1>La Lettre</h1>
                <div class="tagline">La correspondance est en cours de préparation.<br>Le lien se tisse prochainement.</div>
            `;
        }
    </script>

</body>
</html>
