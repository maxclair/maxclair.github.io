
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX CLAIR</title>
    <style>
        /* ARMURE MINIMALISTE */
        body {
            font-family: 'Times New Roman', Times, serif; /* Le classique indémodable */
            margin: 0;
            padding: 0;
            background-color: #fdfdfb; /* Blanc crème, moins agressif que le blanc pur */
            color: #000000;
            line-height: 1.6;
        }

        /* NAVIGATION SOUVERAINE */
        header {
            padding: 40px 0;
            text-align: center;
        }

        nav {
            display: inline-block;
            border-top: 1.5px solid #000; /* Ligne de force supérieure */
            border-bottom: 1.5px solid #000; /* Ligne de force inférieure */
            padding: 10px 0;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-size: 0.9rem;
            letter-spacing: 3px; /* Espacement noble */
            margin: 0 30px;
            font-weight: 400;
            text-transform: uppercase;
        }

        /* ZONE CENTRALE */
        main {
            max-width: 700px;
            margin: 80px auto;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem; /* Immense et central */
            letter-spacing: 8px;
            font-weight: 300;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            margin-top: 20px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            font-style: italic;
        }

    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">Collection</a>
            <a href="#">Journal</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <h1>MAX CLAIR</h1>
        <div class="subtitle">la vérité, tout le temps.</div>
    </main>

</body>
</html>
