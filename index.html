<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX CLAIR — Passer à l'action</title>
    <style>
        /* ARMURE MINIMALISTE - ÉTANCHÉITÉ TOTALE */
        body {
            font-family: 'Times New Roman', Times, serif; 
            margin: 0;
            padding: 0;
            background-color: #fdfdfb; /* Blanc crème noble */
            color: #000000;
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVIGATION PERMANENTE */
        header {
            padding: 60px 0 40px 0;
            text-align: center;
        }

        nav {
            display: inline-block;
            border-top: 1.5px solid #000; 
            border-bottom: 1.5px solid #000; 
            padding: 12px 0;
        }

        nav a {
            text-decoration: none;
            color: #000;
            font-size: 0.85rem;
            letter-spacing: 3px; 
            margin: 0 35px;
            font-weight: 400;
            text-transform: uppercase;
            transition: opacity 0.3s;
        }

        nav a:hover {
            opacity: 0.5;
        }

        /* ZONE CENTRALE : LE SIGNAL */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            padding-bottom: 100px; /* Équilibre visuel avec le header */
        }

        h1 {
            font-size: 3.8rem; 
            letter-spacing: 12px;
            font-weight: 300;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            margin-top: 25px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-style: italic;
            color: #333;
        }

        /* FOOTER : L'ARMURE JURIDIQUE DISCRÈTE */
        footer {
            padding: 40px 0;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #888;
        }

        footer a {
            color: #888;
            text-decoration: none;
            border-bottom: 1px solid #eee;
            transition: all 0.3s;
        }

        footer a:hover {
            color: #000;
            border-bottom: 1px solid #000;
        }

        /* RESPONSIVE : ADAPTATION AUX ÉCRANS MOBILES */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; letter-spacing: 5px; }
            nav a { margin: 0 10px; font-size: 0.7rem; letter-spacing: 1px; }
            .subtitle { font-size: 1rem; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="#">Collection</a>
            <a href="#">Journal</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <h1>MAX CLAIR</h1>
        <div class="subtitle">Passer à l'action en moins d'une heure.</div>
    </main>

    <footer>
        © 2026 MAX CLAIR — <a href="copyright.html">Détails du Copyright & Mentions Légales</a>
    </footer>

</body>
</html>
