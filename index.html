<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAX CLAIR</title>
    <style>
        /* ARMURE MENTALE : ÉDITION IVOIRE ANTIQUE */
        body {
            font-family: 'Times New Roman', Times, serif; 
            margin: 0;
            padding: 0;
            background-color: #FFF9E5; /* Jaune ivoire : le standard du livre de luxe */
            color: #1a1a1a; 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* NAVIGATION : SOBRIÉTÉ ÉTANCE */
        header {
            padding: 60px 0;
            text-align: center;
        }

        nav {
            display: inline-block;
            border-top: 1px solid #1a1a1a; 
            border-bottom: 1px solid #1a1a1a; 
            padding: 15px 0;
        }

        nav a {
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.8rem;
            letter-spacing: 4px; 
            margin: 0 35px;
            font-weight: 400;
            text-transform: uppercase;
        }

        /* ZONE CENTRALE : LE SIGNAL */
        main {
            max-width: 800px;
            margin: 18vh auto; /* Plus d'air vertical pour la stature */
            text-align: center;
        }

        h1 {
            font-size: 3.8rem; 
            letter-spacing: 18px; /* Autorité maximale */
            font-weight: 300;
            margin: 0;
            text-transform: uppercase;
        }

        h1 a {
            text-decoration: none;
            color: inherit;
        }

        .subtitle {
            margin-top: 45px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-style: italic;
            color: #333; 
        }

        /* RIVET DE BAS DE PAGE : SIGNATURE AFFIRMÉE ET DISCRÈTE */
        footer {
            position: fixed;
            bottom: 45px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem; /* Petit pour ne pas rivaliser avec le menu */
            letter-spacing: 6px; /* Très espacé pour le prestige */
            text-transform: uppercase;
            opacity: 1; /* Visibilité franche */
            font-weight: 400;
        }

        footer a {
            text-decoration: none;
            color: inherit;
        }

        footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <header>
        <nav>
            <a href="collection.html">Collection</a>
            <a href="descriptif.html">Max Clair</a>
            <a href="lettre.html">La lettre</a>
        </nav>
    </header>

    <main>
        <h1><a href="https://maxclair.github.io">MAX CLAIR</a></h1>
        <div class="subtitle">Passer à l'action en moins d'une heure.</div>
    </main>

    <footer>
        <a href="copyright.html">© 2026 — MAX CLAIR</a>
    </footer>

</body>
</html>
